<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Playlist Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #fff;
  }

  .glass-card {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .form-control, .form-select {
    border-radius: 12px;
    border: none;
    padding: 12px;
  }

  .btn-primary {
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
  }

  .btn-primary:hover {
    transform: scale(1.05);
  }

  #themeToggle {
    cursor: pointer;
    font-size: 1.4rem;
  }

  .dark-mode {
    background: #0f172a;
  }

  .dark-mode .glass-card {
    background: rgba(30, 41, 59, 0.6);
  }
</style>
</head>
<body>
  <div class="transition-wrapper">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="card w-100" style="max-width: 500px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="mb-0">🎬 Playlist Scheduler</h3>
          <i id="themeToggle" class="fas fa-moon"></i>
        </div>
        <form method="POST" action="/schedule" onsubmit="return showSpinner()">
          <div class="mb-3">
            <label for="playlist_url" class="form-label">YouTube Playlist URL</label>
            <input type="url" class="form-control" id="playlist_url" name="playlist_url" placeholder="https://..." required>
          </div>

          <div class="mb-3">
            <label class="form-label">Schedule Mode</label>
            <select class="form-select" id="mode" name="mode" onchange="toggleFields()" required>
              <option value="duration">By Daily Duration</option>
              <option value="days">By Number of Days</option>
            </select>
          </div>

          <div class="mb-3" id="durationField">
            <label class="form-label">Daily Watch Duration (minutes)</label>
            <input type="number" class="form-control" name="daily_duration" min="1">
          </div>

          <div class="mb-3" id="daysField" style="display: none;">
            <label class="form-label">Number of Days</label>
            <input type="number" class="form-control" id="num_days" name="num_days" min="1">
          </div>

          <button type="submit" class="btn btn-primary w-100">Generate Schedule</button>

          <div id="spinner" class="text-center mt-3" style="display:none;">
            <div class="spinner-border text-info" role="status"></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Developed by LinkedIn link -->
  <div style="position: fixed; bottom: 170px; right: 150px; font-size: 0.95rem; display: flex; align-items: center;">
  <span>Developed by&nbsp;</span>
  <a href="https://www.linkedin.com/in/theaashishgautam/" target="_blank" style="display: flex; align-items: center; text-decoration: none; color: #0a66c2;">
    <i class="fab fa-linkedin fa-lg"></i>&nbsp;<strong>Aashish</strong>
  </a>
</div>

  <script>
    function toggleFields() {
      const mode = document.getElementById("mode").value;
      document.getElementById("durationField").style.display = mode === "duration" ? "block" : "none";
      document.getElementById("daysField").style.display = mode === "days" ? "block" : "none";
    }

    function showSpinner() {
      document.getElementById("spinner").style.display = "block";
      return true;
    }

    const themeToggle = document.getElementById("themeToggle");
    themeToggle.onclick = () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      themeToggle.className = isDark ? "fas fa-sun" : "fas fa-moon";
    };

    window.onload = () => {
      toggleFields();
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
        themeToggle.className = "fas fa-sun";
      }
      document.body.classList.add("loaded");
    };
  </script>
</body>
</html>
