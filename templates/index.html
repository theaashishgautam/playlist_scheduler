<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Playlist Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #8ec5fc, #e0c3fc, #f9f586, #f6d365);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #6c9abd;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .dark-mode {
      background: #121212 !important;
      color: #e0e0e0 !important;
    }

    .dark-mode .card, .dark-mode .form-control, .dark-mode .form-select {
      background-color: #8e8a8a !important;
      color: #e0e0e0 !important;
      border-color: #8f8c8c !important;
    }

    .card {
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    #themeToggle {
      cursor: pointer;
      font-size: 1.5rem;
    }

    .transition-wrapper {
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    body.loaded .transition-wrapper {
      opacity: 1;
    }

    /* ===== NEW HERO SECTION ===== */

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero-title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #076778, #e52e71, #6a11cb);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientText 6s linear infinite;
    }

    @keyframes gradientText {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .hero-subtitle {
      font-size: 1rem;
      margin-top: 10px;
      color: inherit;
      opacity: 0.9;
    }

    .hero-small {
      font-size: 0.9rem;
      margin-top: 15px;
      opacity: 0.8;
    }

  </style>
</head>

<body>
  <div class="transition-wrapper">
    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">

      <!-- ===== HERO SECTION (ADDED) ===== -->
      <div class="hero">
        <div class="hero-title">
          🚀 Smart YouTube Playlist Scheduler
        </div>

        <div class="hero-subtitle">
          Turn Any YouTube Playlist into a Smart Daily Learning Plan <br>
          Automatically split videos by time or days and stay consistent with your learning.
        </div>
      </div>

      <!-- ===== EXISTING FORM (UNCHANGED) ===== -->
      <div class="card w-100" style="max-width: 500px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="mb-0">🎬 Playlist Scheduler</h3>
          <i id="themeToggle" class="fas fa-moon"></i>
        </div>

        <form method="POST" action="/schedule" onsubmit="return showSpinner()">
          <div class="mb-3">
            <label for="playlist_url" class="form-label">YouTube Playlist URL</label>
            <input type="url" class="form-control" id="playlist_url" name="playlist_url" placeholder="https://..." required>
          </div>

          <div class="mb-3">
            <label class="form-label">Schedule Mode</label>
            <select class="form-select" id="mode" name="mode" onchange="toggleFields()" required>
              <option value="duration">By Daily Duration</option>
              <option value="days">By Number of Days</option>
            </select>
          </div>

          <div class="mb-3" id="durationField">
            <label class="form-label">Daily Watch Duration (minutes)</label>
            <input type="number" class="form-control" name="daily_duration" min="1">
          </div>

          <div class="mb-3" id="daysField" style="display: none;">
            <label class="form-label">Number of Days</label>
            <input type="number" class="form-control" id="num_days" name="num_days" min="1">
          </div>

          <button type="submit" class="btn btn-primary w-100">Generate Schedule</button>

          <div id="spinner" class="text-center mt-3" style="display:none;">
            <div class="spinner-border text-info" role="status"></div>
          </div>
        </form>

        <!-- ===== SMALL TEXT ===== -->
        <div class="hero-small text-center">
          No login required • 100% Free
        </div>

      </div>
    </div>
  </div>

  <!-- LinkedIn -->
  <div style="position: fixed; bottom: 170px; right: 150px; font-size: 0.95rem; display: flex; align-items: center;">
    <span>Developed by&nbsp;</span>
    <a href="https://www.linkedin.com/in/theaashishgautam/" target="_blank" style="display: flex; align-items: center; text-decoration: none; color: #0a66c2;">
      <i class="fab fa-linkedin fa-lg"></i>&nbsp;<strong>Aashish</strong>
    </a>
  </div>

  <script>
    function toggleFields() {
      const mode = document.getElementById("mode").value;
      document.getElementById("durationField").style.display = mode === "duration" ? "block" : "none";
      document.getElementById("daysField").style.display = mode === "days" ? "block" : "none";
    }

    function showSpinner() {
      document.getElementById("spinner").style.display = "block";
      return true;
    }

    const themeToggle = document.getElementById("themeToggle");
    themeToggle.onclick = () => {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", isDark);
      themeToggle.className = isDark ? "fas fa-sun" : "fas fa-moon";
    };

    window.onload = () => {
      toggleFields();
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
        themeToggle.className = "fas fa-sun";
      }
      document.body.classList.add("loaded");
    };
  </script>
</body>
</html>
